apiVersion: apps/v1
kind: Deployment
metadata:
  name: aidconnect-frontend
  namespace: aidconnect
  labels:
    app: aidconnect-frontend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aidconnect-frontend
  template:
    metadata:
      labels:
        app: aidconnect-frontend
        version: v1
    spec:
      containers:
      - name: aidconnect-frontend
        image: ghcr.io/kkg-kevin/aidconnect-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
