apiVersion: apps/v1
kind: Deployment
metadata:
  name: aidconnect-frontend
  namespace: aidconnect-staging
  labels:
    app: aidconnect-frontend
    version: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aidconnect-frontend
  template:
    metadata:
      labels:
        app: aidconnect-frontend
        version: staging
    spec:
      containers:
      - name: aidconnect-frontend
        image: ghcr.io/kkg-kevin/connectaid:develop
        ports:
        - containerPort: 80
        env:
        - name: NODE_ENV
          value: "staging"
        - name: REACT_APP_API_URL
          value: "https://api-staging.aidconnect.com/api"
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
