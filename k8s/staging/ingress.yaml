apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aidconnect-frontend-ingress
  namespace: aidconnect-staging
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - staging.aidconnect.com
    secretName: aidconnect-staging-tls
  rules:
  - host: staging.aidconnect.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aidconnect-frontend-service
            port:
              number: 80
